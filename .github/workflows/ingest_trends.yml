name: ingest-trends

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      # Demo safety stop: scheduled runs auto-skip after this UTC timestamp.
      # Update/remove this value when you want recurring runs again.
      DEMO_STOP_AFTER_UTC: "2026-04-01T23:59:59Z"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Demo window guard
        id: demo_guard
        run: |
          python - <<'PY'
          import os
          from datetime import datetime, timezone

          raw = os.getenv("DEMO_STOP_AFTER_UTC", "").strip()
          should_run = "true"
          reason = "no_stop_after_configured"

          if raw:
            cutoff = datetime.fromisoformat(raw.replace("Z", "+00:00"))
            now = datetime.now(timezone.utc)
            if now > cutoff:
              should_run = "false"
              reason = f"past_demo_stop_after:{raw}"
            else:
              reason = f"within_demo_window_until:{raw}"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            fh.write(f"should_run={should_run}\n")
            fh.write(f"reason={reason}\n")
          print(f"Demo guard -> should_run={should_run} ({reason})")
          PY
      - name: Ingest trends into SQLite
        if: steps.demo_guard.outputs.should_run == 'true'
        env:
          CORPUS_DB_PATH: data/corpus.db
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python ingestion/trend_ingestor.py
      - name: Skip reason
        if: steps.demo_guard.outputs.should_run != 'true'
        run: echo "Skipping ingest: ${{ steps.demo_guard.outputs.reason }}"
