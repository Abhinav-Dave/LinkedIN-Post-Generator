name: ingest-trends

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Ingest trends into SQLite
        env:
          CORPUS_DB_PATH: data/corpus.db
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          STOP_AFTER="2026-04-01T23:59:59Z"
          NOW_EPOCH="$(date -u +%s)"
          STOP_EPOCH="$(date -u -d "$STOP_AFTER" +%s)"
          if [ "$NOW_EPOCH" -gt "$STOP_EPOCH" ]; then
            echo "Skipping ingest after demo window: $STOP_AFTER"
            exit 0
          fi
          python ingestion/trend_ingestor.py
